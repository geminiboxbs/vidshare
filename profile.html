<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VidShare - Profil</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="logo">VidShare</a>
        <div class="nav-links">
            <a href="index.html">🏠 Strona główna</a>
            <a href="upload.html">➕ Dodaj film</a>
        </div>
    </nav>

    <div class="profile-container">
        <div class="profile-card">
            <img id="profile-avatar-preview" src="" alt="Avatar" class="profile-avatar">
            <h2 id="profile-username-display">Użytkownik</h2>
            <span class="badge badge-verified">✓ Prawdziwy Człowiek</span>
            
            <hr class="divider">
            
            <h3>Twoje statystyki z bazy sieciowej:</h3>
            <div class="stats-grid">
                <div class="stat-box">
                    <h4 id="stat-videos-count">0</h4>
                    <p>Wrzuconych filmów</p>
                </div>
                <div class="stat-box">
                    <h4 id="stat-posts-count">0</h4>
                    <p>Aktywności na tablicy</p>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
