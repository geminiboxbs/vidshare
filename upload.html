<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dodaj Film - GECODE Video</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">🎯 GECODE Video</div>
        <div class="nav-links">
            <a href="index.html">Główna</a>
            <a href="upload.html" class="active">Dodaj Film</a>
            <a href="profile.html">Mój Profil</a>
        </div>
    </nav>

    <div class="container small-container">
        <div class="card">
            <h2>Prześlij nowy film</h2>
            <p class="info-text">Maksymalny rozmiar: <strong>2 GB</strong>. Maksymalna długość: <strong>2 godziny (120 minut)</strong>.</p>
            
            <form id="upload-form">
                <div class="form-group">
                    <label for="video-title">Tytuł filmu</label>
                    <input type="text" id="video-title" required placeholder="Wpisz tytuł filmu...">
                </div>

                <div class="form-group">
                    <label for="video-file" class="file-label">Wybierz plik wideo</label>
                    <input type="file" id="video-file" accept="video/*" required>
                </div>

                <div id="upload-error" class="error-msg hidden"></div>
                <div id="upload-success" class="success-msg hidden"></div>

                <div id="progress-container" class="hidden">
                    <p id="upload-status-text">Przygotowanie pliku do wysyłki...</p>
                    <div class="progress-bar-bg">
                        <div id="progress-bar-fill"></div>
                    </div>
                </div>

                <button type="submit" id="upload-submit-btn" class="btn">Rozpocznij wysyłanie</button>
            </form>
        </div>
    </div>

    <video id="hidden-video-validator" style="display:none;"></video>

    <script src="app.js"></script>
</body>
</html>
