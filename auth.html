<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VidShare - Autoryzacja</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>
<body>
    <div class="auth-container">
        <div id="auth-step-1" class="auth-card">
            <h2>Stwórz konto</h2>
            <form id="register-form">
                <input type="text" id="reg-username" placeholder="Nazwa użytkownika (login)" required>
                <input type="text" id="reg-fullname" placeholder="Imię i nazwisko" required>
                <input type="tel" id="reg-phone" placeholder="Numer telefonu (np. +48500600700)" required>
                <input type="password" id="reg-password" placeholder="Hasło" required>
                <button type="submit" class="btn">Zarejestruj się</button>
            </form>
        </div>

        <div id="auth-step-2" class="auth-card hidden">
            <h2>Weryfikacja SMS</h2>
            <p id="sms-info-text"></p>
            
            <div id="recaptcha-container"></div>

            <input type="text" id="sms-code-input" placeholder="6-cyfrowy kod z SMS" maxlength="6">
            <button id="start-verification-btn" class="btn">Zweryfikuj kod</button>
            
            <div id="verification-error" class="error-msg hidden"></div>
            
            <div id="scan-progress-box" class="progress-box hidden">
                <p id="scan-status-text">Sprawdzanie kodu tokenu...</p>
                <div class="progress-bar"><div id="scan-bar-fill" class="progress-fill"></div></div>
            </div>
        </div>

        <div id="auth-step-3" class="auth-card hidden">
            <h2>Konto aktywne! 🎉</h2>
            <p>Twój numer telefonu został pomyślnie zweryfikowany w chmurze Firebase.</p>
            <button id="enter-platform-btn" class="btn">Wejdź na platformę</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
