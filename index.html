<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VidShare - Główna</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="logo">VidShare</a>
        <div class="nav-links">
            <a href="upload.html">➕ Dodaj film</a>
            <a href="profile.html" id="nav-profile-link">👤 Profil</a>
        </div>
    </nav>

    <div class="main-layout">
        <div class="video-section">
            <div class="player-container">
                <video id="main-player" controls poster="https://images.unsplash.com/photo-1611162617213-7d7a39e9b1d7?w=800"></video>
                <h3 id="current-video-title">Wybierz film z listy poniżej, aby rozpocząć odtwarzanie</h3>
            </div>
            
            <h3>Najnowsze wideo w sieci</h3>
            <div id="videos-grid" class="videos-grid">
                </div>
        </div>

        <div class="community-section">
            <h3>Społeczność Live</h3>
            <div class="tab-system">
                <button class="tab-btn active" onclick="switchTab('post')">Wpis</button>
                <button class="tab-btn" onclick="switchTab('poll')">Ankieta</button>
            </div>

            <form id="post-form" class="feed-form">
                <textarea id="post-content" placeholder="Co tam słychać?" required></textarea>
                <button type="submit" class="btn-sm">Opublikuj</button>
            </form>

            <form id="poll-form" class="feed-form hidden">
                <input type="text" id="poll-question" placeholder="Zadaj pytanie..." required>
                <input type="text" class="poll-option" placeholder="Opcja 1" required>
                <input type="text" class="poll-option" placeholder="Opcja 2" required>
                <button type="button" id="add-option-btn" class="btn-text">+ Dodaj opcję</button>
                <button type="submit" class="btn-sm">Uruchom ankietę</button>
            </form>

            <div id="community-feed" class="feed-container">
                </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
